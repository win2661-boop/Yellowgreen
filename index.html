<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리 가족 깊이이음 연표</title>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #f0f7ff; padding: 20px; text-align: center; }
        .container { max-width: 850px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h1 { color: #4a90e2; }
        input, select, textarea { padding: 8px; margin: 5px; border-radius: 10px; border: 2px solid #b3d7ff; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #cce5ff; padding: 8px; text-align: center; }
        .move-btn { cursor: pointer; border: none; background: #eef; border-radius: 5px; padding: 5px; font-weight: bold; }
        .action-btn { margin: 10px; padding: 12px 20px; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
        .interaction-box { margin-top: 30px; text-align: left; padding: 15px; border: 2px solid #4a90e2; border-radius: 15px; background-color: #f9fbff; }
        #sendBtn { background-color: #e74c3c; margin-top: 30px; padding: 20px 40px; border: none; border-radius: 15px; color: white; cursor: pointer; font-weight: bold; font-size: 1.2em; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="container" id="capture">
    <input type="text" id="nameInput" placeholder="이름 (예: 김철수)" oninput="updateTitle()" style="width: 200px;">
    <h1><span id="displayName">000</span>네 가족 연표</h1>

    <table id="timelineTable">
        <thead>
            <tr><th>순서 이동</th><th>연도</th><th>가족의 중요한 일</th><th>이유</th><th>감정</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div style="margin-top: 20px;">
        <button class="action-btn" style="background-color: #e67e22;" onclick="restoreOriginalOrder()">1. 중요한 일 순서대로 보기</button>
        <button class="action-btn" style="background-color: #4a90e2;" onclick="sortRowsByTime()">2. 시간의 흐름 순서대로 보기</button>
    </div>

    <div class="interaction-box">
        <p><strong>👤 친구 아이콘:</strong> 친구의 가족 연표를 보고 감동적인 응원 한마디!</p>
        <textarea style="width: 95%; height: 50px;" placeholder="친구에게 힘이 되는 응원을 남겨주세요."></textarea>
        
        <p><strong>❓ 질문 아이콘:</strong> 친구의 가족 연표를 보고 궁금한 점 질문하기</p>
        <textarea style="width: 95%; height: 50px;" placeholder="궁금한 내용을 질문해 보세요."></textarea>
        
        <p><strong>✍️ 나의 대답:</strong> 친구의 질문에 대한 나의 답변</p>
        <textarea style="width: 95%; height: 50px;" placeholder="질문을 받은 친구는 여기에 답변을 달아주세요."></textarea>
        
        <p><strong>💡 탐구 문제:</strong> <small>(예시: 시간의 흐름에 따라 정리하면 무엇을 알 수 있을까?)</small></p>
        <input type="text" style="width: 95%;" placeholder="탐구 문제를 직접 적어보세요.">
        
        <p><strong>📝 나의 답:</strong></p>
        <textarea style="width: 95%; height: 60px;" placeholder="탐구 문제에 대한 답을 입력해 봅시다."></textarea>
    </div>

    <button id="sendBtn" onclick="sendToTeacher()">선생님께 메일 보내기 (win2661@gmail.com)</button>
</div>

<script>
    const tbody = document.getElementById('tableBody');
    let fixedOrder = [];

    for(let i=0; i<5; i++) {
        let row = tbody.insertRow();
        row.innerHTML = `
            <td>
                <button class="move-btn" onclick="moveRow(this, -1)">▲</button>
                <button class="move-btn" onclick="moveRow(this, 1)">▼</button>
            </td>
            <td><select class="year">${Array.from({length:22}, (_,j) => `<option value="${2026-j}">${2026-j}년</option>`).join('')}</select></td>
            <td><input type="text" placeholder="내용" style="width:100px"></td>
            <td><input type="text" placeholder="이유" style="width:100px"></td>
            <td><select class="emotion">
                <option value="😊 기쁨">😊 기쁨</option><option value="😆 즐거움">😆 즐거움</option>
                <option value="🥰 사랑">🥰 사랑</option><option value="🤩 감동">🤩 감동</option>
                <option value="😢 슬픔">😢 슬픔</option><option value="😡 화남">😡 화남</option>
                <option value="😨 무서움">😨 무서움</option><option value="😟 걱정">😟 걱정</option>
                <option value="😑 서운함">😑 서운함</option><option value="😎 뿌듯함">😎 뿌듯함</option>
                <option value="🤔 궁금함">🤔 궁금함</option><option value="🤗 고마움">🤗 고마움</option>
            </select></td>`;
    }
    fixedOrder = Array.from(tbody.rows);

    function updateTitle() { document.getElementById('displayName').innerText = document.getElementById('nameInput').value || '000'; }

    function moveRow(btn, direction) {
        let row = btn.parentNode.parentNode;
        let newIndex = row.rowIndex + direction;
        if (newIndex > 0 && newIndex < tbody.rows.length + 1) {
            tbody.insertBefore(direction === -1 ? row : row.nextSibling, direction === -1 ? row.previousSibling : row.nextSibling.nextSibling);
            fixedOrder = Array.from(tbody.rows);
        }
    }

    function restoreOriginalOrder() { fixedOrder.forEach(row => tbody.appendChild(row)); }

    function sortRowsByTime() {
        let rows = Array.from(tbody.rows);
        rows.sort((a, b) => a.querySelector('.year').value - b.querySelector('.year').value);
        rows.forEach(row => tbody.appendChild(row));
    }

    function sendToTeacher() {
        html2canvas(document.getElementById("capture")).then(canvas => {
            let name = document.getElementById('nameInput').value || '학생';
            alert("이미지가 저장됩니다! 선생님 메일(win2661@gmail.com)로 이 파일을 첨부해서 꼭 보내주세요.");
            let link = document.createElement('a');
            link.download = `${name}_가족_연표.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
