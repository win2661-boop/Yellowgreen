<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리 가족 깊이이음 연표</title>
    <style>
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #f0f7ff; padding: 20px; text-align: center; }
        .container { max-width: 850px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h1 { color: #4a90e2; }
        input, select { padding: 8px; margin: 2px; border-radius: 10px; border: 2px solid #b3d7ff; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #cce5ff; padding: 8px; text-align: center; }
        .move-btn { cursor: pointer; border: none; background: #eef; border-radius: 5px; padding: 5px; font-weight: bold; }
        .action-btn { margin: 10px; padding: 12px 20px; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
        #impBtn { background-color: #e67e22; } /* 중요한 일 순서 */
        #timeBtn { background-color: #4a90e2; } /* 시간의 흐름 */
        #saveBtn { background-color: #27ae60; } /* 이미지 저장 */
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="container" id="capture">
    <input type="text" id="nameInput" placeholder="가족 이름 (예: 김철수)" oninput="updateTitle()" style="width: 200px;">
    <h1><span id="displayName">000</span>네 가족 연표</h1>

    <table id="timelineTable">
        <thead>
            <tr><th>순서 이동</th><th>연도</th><th>가족의 중요한 일</th><th>이유</th><th>감정</th></tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
    <br>
    <button class="action-btn" id="impBtn" onclick="alert('학생이 직접 화살표(▲, ▼)를 눌러 중요도 순으로 배치해주세요!')">1. 중요한 일 순서대로</button>
    <button class="action-btn" id="timeBtn" onclick="sortRowsByTime()">2. 시간의 흐름 순서대로</button>
    <button class="action-btn" id="saveBtn" onclick="downloadImage()">3. 이미지로 저장하기</button>
</div>

<script>
    const tbody = document.getElementById('tableBody');
    for(let i=0; i<5; i++) {
        let row = tbody.insertRow();
        row.innerHTML = `
            <td>
                <button class="move-btn" onclick="moveRow(this, -1)">▲</button>
                <button class="move-btn" onclick="moveRow(this, 1)">▼</button>
            </td>
            <td><select class="year">${Array.from({length:22}, (_,j) => `<option value="${2026-j}">${2026-j}년</option>`).join('')}</select></td>
            <td><input type="text" placeholder="내용" style="width:120px"></td>
            <td><input type="text" placeholder="이유" style="width:120px"></td>
            <td><select class="emotion">
                <option value="😊 기쁨">😊 기쁨</option><option value="😆 즐거움">😆 즐거움</option>
                <option value="🥰 사랑">🥰 사랑</option><option value="🤩 감동">🤩 감동</option>
                <option value="😢 슬픔">😢 슬픔</option><option value="😡 화남">😡 화남</option>
                <option value="😨 무서움">😨 무서움</option><option value="😟 걱정">😟 걱정</option>
                <option value="😑 서운함">😑 서운함</option><option value="😎 뿌듯함">😎 뿌듯함</option>
            </select></td>`;
    }

    function updateTitle() {
        document.getElementById('displayName').innerText = document.getElementById('nameInput').value || '000';
    }

    // 위아래 이동
    function moveRow(btn, direction) {
        let row = btn.parentNode.parentNode;
        let table = document.getElementById("timelineTable");
        let newIndex = row.rowIndex + direction;
        if (newIndex > 0 && newIndex < table.rows.length) {
            table.tBodies[0].insertBefore(direction === -1 ? row : row.nextSibling, direction === -1 ? row.previousSibling : row.nextSibling.nextSibling);
        }
    }

    // 시간 순 정렬
    function sortRowsByTime() {
        let rows = Array.from(tbody.rows);
        rows.sort((a, b) => a.querySelector('.year').value - b.querySelector('.year').value);
        rows.forEach(row => tbody.appendChild(row));
    }

    function downloadImage() {
        html2canvas(document.getElementById("capture")).then(canvas => {
            let link = document.createElement('a');
            link.download = '우리_가족_연표.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
