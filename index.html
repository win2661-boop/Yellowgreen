<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가족 연표 제작 사이트</title>

  <style>
    :root {
      --bg: #fbf6ee;
      --paper: #fffdf8;
      --line: #d8c7b2;
      --line-dark: #b89f82;
      --text: #312b25;
      --muted: #6f645a;
      --brown: #7c5736;
      --brown2: #9d7047;
      --green: #58765a;
      --blue: #5578b5;
      --orange: #c78345;
      --shadow: 0 10px 24px rgba(89, 65, 39, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 4% 4%, #fff0ca 0 130px, transparent 132px),
        radial-gradient(circle at 96% 2%, #eaf4e4 0 120px, transparent 122px),
        linear-gradient(180deg, #fffbf4 0%, var(--bg) 100%);
    }

    .page {
      max-width: 1380px;
      margin: 0 auto;
      padding: 14px;
    }

    .sheet {
      background: var(--paper);
      border: 2px solid var(--line-dark);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 14px;
      position: relative;
      overflow: hidden;
    }

    .sheet::before {
      content: "";
      position: absolute;
      inset: 9px;
      border: 1px dashed rgba(184, 159, 130, 0.45);
      border-radius: 17px;
      pointer-events: none;
    }

    .inner {
      position: relative;
      z-index: 1;
    }

    .top {
      padding: 12px 14px;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(90deg, #fff8ed, #fffdf8);
      margin-bottom: 10px;
    }

    .custom-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--brown);
      font-size: clamp(23px, 2.4vw, 34px);
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .custom-title-input {
      flex: 1;
      min-width: 220px;
      border: 0;
      border-bottom: 3px solid var(--brown2);
      background: transparent;
      color: var(--brown);
      font: inherit;
      font-weight: 900;
      outline: none;
      padding: 0 6px 3px;
    }

    .timeline-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 210px;
      gap: 10px;
      align-items: start;
    }

    .table-card {
      overflow-x: auto;
      border: 2px solid var(--line-dark);
      border-radius: 16px;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: separate;
      border-spacing: 0;
    }

    th,
    td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th:last-child,
    td:last-child {
      border-right: 0;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    th {
      background: linear-gradient(180deg, #f3e6d3, #ead8c0);
      color: var(--brown);
      padding: 10px 6px;
      text-align: center;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.25;
    }

    td {
      background: #fffefb;
      padding: 8px;
    }

    tbody tr:nth-child(even) td {
      background: #fff9ef;
    }

    .move-cell {
      width: 72px;
      text-align: center;
    }

    .year-cell {
      width: 130px;
    }

    .event-cell {
      width: 560px;
    }

    .emotion-cell {
      width: 155px;
    }

    input,
    textarea,
    select,
    button {
      font: inherit;
    }

    textarea,
    select {
      width: 100%;
      border: 1.5px solid #cdbca7;
      border-radius: 11px;
      background: #fffefc;
      color: var(--text);
      padding: 8px 9px;
      outline: none;
    }

    textarea:focus,
    select:focus,
    .custom-title-input:focus,
    input:focus {
      border-color: var(--brown2);
      box-shadow: 0 0 0 3px rgba(157, 112, 71, 0.15);
    }

    textarea {
      min-height: 82px;
      line-height: 1.38;
      resize: vertical;
    }

    .move-buttons {
      min-height: 84px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .arrow-btn {
      width: 36px;
      height: 30px;
      border: 1.5px solid var(--line-dark);
      border-radius: 9px;
      color: var(--brown);
      background: #fff2dc;
      font-weight: 900;
      cursor: pointer;
    }

    .arrow-btn:hover {
      background: #ffe3bd;
    }

    .arrow-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .side-panel {
      position: sticky;
      top: 12px;
      border: 2px solid var(--line);
      border-radius: 16px;
      background: #fffefb;
      padding: 12px;
      box-shadow: 0 5px 14px rgba(89, 65, 39, 0.08);
    }

    .side-panel h2 {
      margin: 0 0 9px;
      color: var(--brown);
      font-size: 17px;
      letter-spacing: -0.02em;
    }

    .side-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .action-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 10px;
      color: #fff;
      font-weight: 900;
      line-height: 1.25;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(63, 47, 31, 0.14);
    }

    .btn-manual {
      background: var(--brown2);
    }

    .btn-manual:hover {
      background: #835b36;
    }

    .btn-time {
      background: var(--green);
    }

    .btn-time:hover {
      background: #425d45;
    }

    .btn-save {
      background: var(--blue);
    }

    .btn-save:hover {
      background: #3f639c;
    }

    .btn-add {
      background: var(--orange);
    }

    .btn-add:hover {
      background: #a9652e;
    }

    .status {
      margin-top: 10px;
      padding: 9px;
      background: #fff8ed;
      border: 1.5px dashed var(--line-dark);
      border-radius: 12px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .reflection {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      margin-top: 10px;
    }

    .box {
      background: #fffefb;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 10px;
    }

    .box h3,
    .inquiry h3 {
      margin: 0 0 7px;
      font-size: 16px;
      color: var(--brown);
      letter-spacing: -0.02em;
    }

    .box label,
    .field-title {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .double-inputs {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .small-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      margin-bottom: 4px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #fff1dc;
      border: 1px solid #efd8b6;
      color: var(--brown);
      font-size: 12px;
      font-weight: 900;
    }

    .box textarea {
      min-height: 54px;
    }

    .inquiry {
      margin-top: 9px;
      padding: 10px;
      border: 2px solid #bfd3bd;
      border-radius: 16px;
      background: linear-gradient(180deg, #f5fbf1, #fffefb);
    }

    .inquiry h3 {
      color: var(--green);
    }

    .inquiry-grid {
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 9px;
    }

    .input-line {
      width: 100%;
      border: 1.5px solid #b9ccb6;
      border-radius: 11px;
      background: #fffefc;
      color: var(--text);
      padding: 8px 9px;
      outline: none;
    }

    .note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 1120px) {
      .timeline-layout {
        grid-template-columns: 1fr;
      }

      .side-panel {
        position: static;
      }

      .side-buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 8px;
      }

      .sheet {
        padding: 9px;
        border-radius: 16px;
      }

      .top {
        padding: 9px;
      }

      .reflection,
      .inquiry-grid {
        grid-template-columns: 1fr;
      }

      .side-buttons {
        grid-template-columns: 1fr;
      }

      .custom-title-input {
        min-width: 120px;
      }
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 8mm;
      }

      html,
      body {
        background: white;
        margin: 0;
        padding: 0;
      }

      .page {
        max-width: none;
        padding: 0;
      }

      .sheet {
        box-shadow: none;
        border: 1.2px solid #777;
        border-radius: 0;
        padding: 7px;
        overflow: visible;
      }

      .sheet::before {
        display: none;
      }

      .top {
        border: 1px solid #999;
        border-radius: 0;
        padding: 7px;
        margin-bottom: 5px;
      }

      .custom-title-row {
        font-size: 19px;
        color: #222;
      }

      .custom-title-input {
        border-bottom: 1.5px solid #333;
        color: #222;
        box-shadow: none !important;
      }

      .side-panel {
        display: none;
      }

      .timeline-layout {
        display: block;
      }

      .table-card {
        overflow: visible;
        border: 1px solid #777;
        border-radius: 0;
      }

      table {
        min-width: 0;
        table-layout: fixed;
      }

      th {
        font-size: 11px;
        padding: 4px 3px;
        background: #eee !important;
        color: #222;
      }

      td {
        padding: 4px;
        background: white !important;
      }

      .move-cell {
        width: 40px;
      }

      .year-cell {
        width: 78px;
      }

      .event-cell {
        width: 420px;
      }

      .emotion-cell {
        width: 95px;
      }

      .arrow-btn {
        display: none;
      }

      .move-buttons {
        min-height: 50px;
      }

      textarea,
      select {
        border: 1px solid #999;
        border-radius: 0;
        box-shadow: none !important;
        padding: 4px;
        font-size: 10.5px;
        min-height: 50px;
        appearance: none;
        background: white !important;
      }

      select {
        min-height: 24px;
      }

      .reflection {
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        margin-top: 5px;
      }

      .box {
        border: 1px solid #999;
        border-radius: 0;
        padding: 5px;
        background: white !important;
      }

      .box h3,
      .inquiry h3 {
        font-size: 11px;
        margin-bottom: 3px;
        color: #222;
      }

      .box label,
      .field-title {
        font-size: 9.5px;
        margin-bottom: 2px;
        color: #222;
      }

      .small-label {
        border: 1px solid #999;
        background: #fff !important;
        color: #222;
        font-size: 8.5px;
        padding: 1px 4px;
        width: auto;
      }

      .box textarea {
        min-height: 32px;
      }

      .inquiry {
        border: 1px solid #999;
        border-radius: 0;
        background: white !important;
        padding: 5px;
        margin-top: 5px;
      }

      .inquiry-grid {
        grid-template-columns: 1.25fr 1fr;
        gap: 5px;
      }

      .input-line {
        border: 1px solid #999;
        border-radius: 0;
        box-shadow: none !important;
        padding: 4px;
        font-size: 10px;
        background: white !important;
      }

      .note {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="sheet" id="captureArea">
      <div class="inner">
        <section class="top">
          <div class="custom-title-row">
            <span>제목 :</span>
            <input
              id="customTitle"
              class="custom-title-input"
              type="text"
              autocomplete="off"
            />
          </div>
        </section>

        <section class="timeline-layout">
          <section class="table-card">
            <table aria-label="가족 연표 입력표">
              <thead>
                <tr>
                  <th class="move-cell">순서<br />이동</th>
                  <th class="year-cell">연도</th>
                  <th class="event-cell">가족의 중요한 일</th>
                  <th class="emotion-cell">감정<br />이모티콘</th>
                </tr>
              </thead>

              <tbody id="timelineBody"></tbody>
            </table>
          </section>

          <aside class="side-panel">
            <h2>보기 방법</h2>

            <div class="side-buttons">
              <button class="action-btn btn-add" type="button" id="addRowBtn">
                칸<br />추가하기
              </button>

              <button class="action-btn btn-manual" type="button" id="manualOrderBtn">
                중요한 일<br />순서대로 보기
              </button>

              <button class="action-btn btn-time" type="button" id="timeOrderBtn">
                시간 순서대로<br />보기
              </button>

              <button class="action-btn btn-save" type="button" id="saveBtn">
                이미지로<br />저장하기
              </button>
            </div>

            <div class="status" id="sortStatus">
              현재 보기: 중요한 일 순서
            </div>
          </aside>
        </section>

        <section class="reflection">
          <div class="box">
            <h3>👥 친구</h3>
            <label>친구의 가족 연표를 보고 응원의 한마디!</label>
            <div class="double-inputs">
              <div>
                <span class="small-label">1번</span>
                <textarea id="cheer1"></textarea>
              </div>
              <div>
                <span class="small-label">2번</span>
                <textarea id="cheer2"></textarea>
              </div>
            </div>
          </div>

          <div class="box">
            <h3>❓ 질문</h3>
            <label>친구의 가족 연표를 보고 궁금한 점 질문하기</label>
            <div class="double-inputs">
              <div>
                <span class="small-label">1번</span>
                <textarea id="question1"></textarea>
              </div>
              <div>
                <span class="small-label">2번</span>
                <textarea id="question2"></textarea>
              </div>
            </div>
          </div>

          <div class="box">
            <h3>💬 나의 대답</h3>
            <label>친구의 질문에 대답하기</label>
            <div class="double-inputs">
              <div>
                <span class="small-label">1번</span>
                <textarea id="answerToFriend1"></textarea>
              </div>
              <div>
                <span class="small-label">2번</span>
                <textarea id="answerToFriend2"></textarea>
              </div>
            </div>
          </div>
        </section>

        <section class="inquiry">
          <h3>🔎 탐구 질문과 나의 답</h3>

          <div class="inquiry-grid">
            <div>
              <label class="field-title" for="inquiryQuestion">탐구 질문</label>
              <input
                id="inquiryQuestion"
                class="input-line"
                type="text"
              />
            </div>

            <div>
              <label class="field-title" for="myAnswer">나의 답</label>
              <input
                id="myAnswer"
                class="input-line"
                type="text"
              />
            </div>
          </div>
        </section>

        <p class="note">
          ※ 칸 추가하기를 누르면 연표 행이 한 줄씩 늘어납니다. 이미지로 저장하면 작성한 가족 연표를 PNG 파일로 내려받을 수 있습니다.
        </p>
      </div>
    </section>
  </main>

  <script>
    const YEARS = Array.from({ length: 2026 - 2005 + 1 }, (_, i) => 2005 + i);

    const EMOTIONS = [
      "😊 기쁨",
      "🥰 사랑",
      "😮 놀람",
      "😢 슬픔",
      "😆 신남",
      "😌 평온",
      "😎 자랑스러움",
      "🤔 궁금함",
      "🙏 고마움",
      "💪 용기",
      "🎉 축하",
      "🌟 특별함"
    ];

    function makeId(i) {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }

      return `row-${Date.now()}-${i}`;
    }

    let rows = Array.from({ length: 5 }, (_, i) => ({
      id: makeId(i),
      importantIndex: i,
      year: "",
      event: "",
      emotion: ""
    }));

    const $ = (selector) => document.querySelector(selector);
    const body = $("#timelineBody");
    const sortStatus = $("#sortStatus");

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function saveCurrentInputs() {
      Array.from(body.querySelectorAll("tr")).forEach((tr) => {
        const row = rows.find((item) => item.id === tr.dataset.id);

        if (!row) return;

        row.year = tr.querySelector(".year-select").value;
        row.event = tr.querySelector(".event-input").value;
        row.emotion = tr.querySelector(".emotion-select").value;
      });
    }

    function render() {
      body.innerHTML = "";

      rows.forEach((row, index) => {
        const tr = document.createElement("tr");
        tr.dataset.id = row.id;

        tr.innerHTML = `
          <td class="move-cell">
            <div class="move-buttons">
              <button
                type="button"
                class="arrow-btn up-btn"
                aria-label="위로 이동"
                ${index === 0 ? "disabled" : ""}
              >
                ▲
              </button>

              <button
                type="button"
                class="arrow-btn down-btn"
                aria-label="아래로 이동"
                ${index === rows.length - 1 ? "disabled" : ""}
              >
                ▼
              </button>
            </div>
          </td>

          <td class="year-cell">
            <select class="year-select" aria-label="연도 선택">
              <option value="">연도 선택</option>
              ${YEARS.map((year) => `
                <option value="${year}" ${String(row.year) === String(year) ? "selected" : ""}>
                  ${year}년도
                </option>
              `).join("")}
            </select>
          </td>

          <td class="event-cell">
            <textarea class="event-input" placeholder="가족의 중요한 일을 적어 보세요.">${escapeHtml(row.event)}</textarea>
          </td>

          <td class="emotion-cell">
            <select class="emotion-select" aria-label="감정 선택">
              <option value="">감정 선택</option>
              ${EMOTIONS.map((emotion) => `
                <option value="${emotion}" ${row.emotion === emotion ? "selected" : ""}>
                  ${emotion}
                </option>
              `).join("")}
            </select>
          </td>
        `;

        body.appendChild(tr);
      });
    }

    function normalizeImportantIndex() {
      rows.forEach((row, index) => {
        row.importantIndex = index;
      });
    }

    function swapRows(fromIndex, toIndex) {
      if (toIndex < 0 || toIndex >= rows.length) return;

      saveCurrentInputs();

      [rows[fromIndex], rows[toIndex]] = [rows[toIndex], rows[fromIndex]];

      normalizeImportantIndex();

      sortStatus.textContent = "현재 보기: 중요한 일 순서";

      render();
    }

    function addRow() {
      saveCurrentInputs();

      rows.push({
        id: makeId(rows.length),
        importantIndex: rows.length,
        year: "",
        event: "",
        emotion: ""
      });

      sortStatus.textContent = "칸이 1개 추가되었습니다.";

      render();
    }

    body.addEventListener("click", (event) => {
      const up = event.target.closest(".up-btn");
      const down = event.target.closest(".down-btn");

      if (!up && !down) return;

      const tr = event.target.closest("tr");
      const index = Array.from(body.children).indexOf(tr);

      if (up) swapRows(index, index - 1);
      if (down) swapRows(index, index + 1);
    });

    $("#addRowBtn").addEventListener("click", addRow);

    $("#manualOrderBtn").addEventListener("click", () => {
      saveCurrentInputs();

      rows.sort((a, b) => a.importantIndex - b.importantIndex);

      sortStatus.textContent = "현재 보기: 중요한 일 순서";

      render();
    });

    $("#timeOrderBtn").addEventListener("click", () => {
      saveCurrentInputs();

      rows.sort((a, b) => {
        const ay = a.year ? Number(a.year) : 9999;
        const by = b.year ? Number(b.year) : 9999;

        if (ay !== by) return ay - by;

        return a.importantIndex - b.importantIndex;
      });

      sortStatus.textContent = "현재 보기: 시간 순서(오래된 일 → 최근 일)";

      render();
    });

    function drawRoundedRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();

      if (fill) {
        ctx.fillStyle = fill;
        ctx.fill();
      }

      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 3) {
      const raw = String(text || "").trim();

      if (!raw) return y;

      const tokens = raw.includes(" ") ? raw.split(/\s+/) : Array.from(raw);
      let line = "";
      const lines = [];

      for (const token of tokens) {
        const testLine = raw.includes(" ") ? (line ? `${line} ${token}` : token) : line + token;

        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = token;
        } else {
          line = testLine;
        }
      }

      if (line) lines.push(line);

      const output = lines.slice(0, maxLines);

      if (lines.length > maxLines) {
        while (
          ctx.measureText(output[maxLines - 1] + "…").width > maxWidth &&
          output[maxLines - 1].length > 1
        ) {
          output[maxLines - 1] = output[maxLines - 1].slice(0, -1);
        }

        output[maxLines - 1] += "…";
      }

      output.forEach((lineText, index) => {
        ctx.fillText(lineText, x, y + index * lineHeight);
      });

      return y + output.length * lineHeight;
    }

    function saveAsImage() {
      saveCurrentInputs();

      const scale = 2;
      const width = 1754;
      const headerTop = 140;
      const tableHeaderH = 54;
      const rowH = 124;
      const tableH = tableHeaderH + rowH * rows.length;
      const refH = 178;
      const inquiryH = 105;
      const bottomPadding = 40;
      const height = headerTop + tableH + 24 + refH + 16 + inquiryH + bottomPadding;

      const canvas = document.createElement("canvas");
      canvas.width = width * scale;
      canvas.height = height * scale;

      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);

      ctx.fillStyle = "#fffdf8";
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = "#fff0dc";
      ctx.beginPath();
      ctx.arc(80, 72, 74, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#eef6ea";
      ctx.beginPath();
      ctx.arc(width - 95, 72, 82, 0, Math.PI * 2);
      ctx.fill();

      drawRoundedRect(ctx, 30, 28, width - 60, 88, 18, "#fff8ed", "#b89f82");

      const customTitle = $("#customTitle").value.trim() || "      ";

      ctx.fillStyle = "#7c5736";
      ctx.font = "bold 38px Malgun Gothic, Arial";
      ctx.fillText(`제목 : ${customTitle}`, 55, 83);

      const x0 = 30;
      const y0 = 140;
      const tableW = width - 60;

      const cols = [90, 140, 1180, 284];
      const headers = [
        "순서",
        "연도",
        "가족의 중요한 일",
        "감정"
      ];

      drawRoundedRect(ctx, x0, y0, tableW, tableH, 14, "#ffffff", "#b89f82");

      ctx.save();
      ctx.beginPath();
      ctx.rect(x0, y0, tableW, tableH);
      ctx.clip();

      ctx.fillStyle = "#f3e6d3";
      ctx.fillRect(x0, y0, tableW, tableHeaderH);

      let cx = x0;

      ctx.strokeStyle = "#b89f82";
      ctx.lineWidth = 2;
      ctx.fillStyle = "#7c5736";
      ctx.font = "bold 20px Malgun Gothic, Arial";

      headers.forEach((header, index) => {
        wrapText(ctx, header, cx + 12, y0 + 34, cols[index] - 24, 22, 1);

        cx += cols[index];

        ctx.beginPath();
        ctx.moveTo(cx, y0);
        ctx.lineTo(cx, y0 + tableH);
        ctx.stroke();
      });

      ctx.beginPath();
      ctx.moveTo(x0, y0 + tableHeaderH);
      ctx.lineTo(x0 + tableW, y0 + tableHeaderH);
      ctx.stroke();

      rows.forEach((row, index) => {
        const yy = y0 + tableHeaderH + rowH * index;

        ctx.fillStyle = index % 2 === 0 ? "#fffdf8" : "#fff8ed";
        ctx.fillRect(x0 + 1, yy + 1, tableW - 2, rowH - 2);

        ctx.beginPath();
        ctx.moveTo(x0, yy + rowH);
        ctx.lineTo(x0 + tableW, yy + rowH);
        ctx.stroke();

        let x = x0;

        ctx.fillStyle = "#7c5736";
        ctx.font = "bold 25px Malgun Gothic, Arial";
        ctx.fillText(String(index + 1), x + 34, yy + 72);
        x += cols[0];

        ctx.fillStyle = "#312b25";
        ctx.font = "bold 20px Malgun Gothic, Arial";

        if (row.year) {
          ctx.fillText(`${row.year}년도`, x + 12, yy + 42);
        }

        x += cols[1];

        ctx.font = "21px Malgun Gothic, Arial";
        wrapText(ctx, row.event, x + 14, yy + 36, cols[2] - 28, 28, 3);
        x += cols[2];

        ctx.font = "20px Malgun Gothic, Apple Color Emoji, Segoe UI Emoji, Arial";
        wrapText(ctx, row.emotion, x + 14, yy + 42, cols[3] - 28, 28, 3);
      });

      ctx.restore();

      const refY = y0 + tableH + 24;
      const gap = 12;
      const boxW = (tableW - gap * 2) / 3;

      const refData = [
        ["👥 친구", "친구의 가족 연표를 보고 응원의 한마디!", [$("#cheer1").value, $("#cheer2").value]],
        ["❓ 질문", "친구의 가족 연표를 보고 궁금한 점 질문하기", [$("#question1").value, $("#question2").value]],
        ["💬 나의 대답", "친구의 질문에 대답하기", [$("#answerToFriend1").value, $("#answerToFriend2").value]]
      ];

      refData.forEach((item, index) => {
        const bx = x0 + index * (boxW + gap);

        drawRoundedRect(ctx, bx, refY, boxW, refH, 13, "#fffefb", "#d8c7b2");

        ctx.fillStyle = "#7c5736";
        ctx.font = "bold 18px Malgun Gothic, Arial";
        ctx.fillText(item[0], bx + 14, refY + 29);

        ctx.fillStyle = "#6f645a";
        ctx.font = "15px Malgun Gothic, Arial";
        wrapText(ctx, item[1], bx + 14, refY + 55, boxW - 28, 21, 2);

        ctx.fillStyle = "#7c5736";
        ctx.font = "bold 14px Malgun Gothic, Arial";
        ctx.fillText("1번", bx + 14, refY + 91);
        ctx.fillText("2번", bx + 14, refY + 134);

        ctx.fillStyle = "#312b25";
        ctx.font = "16px Malgun Gothic, Arial";
        wrapText(ctx, item[2][0], bx + 58, refY + 91, boxW - 72, 20, 2);
        wrapText(ctx, item[2][1], bx + 58, refY + 134, boxW - 72, 20, 2);
      });

      const inquiryY = refY + refH + 16;

      drawRoundedRect(ctx, x0, inquiryY, tableW, inquiryH, 13, "#f5fbf1", "#bfd3bd");

      ctx.fillStyle = "#58765a";
      ctx.font = "bold 19px Malgun Gothic, Arial";
      ctx.fillText("🔎 탐구 질문", x0 + 17, inquiryY + 36);
      ctx.fillText("나의 답", x0 + 17, inquiryY + 77);

      ctx.fillStyle = "#312b25";
      ctx.font = "18px Malgun Gothic, Arial";
      wrapText(ctx, $("#inquiryQuestion").value, x0 + 140, inquiryY + 36, tableW - 160, 24, 1);
      wrapText(ctx, $("#myAnswer").value, x0 + 140, inquiryY + 77, tableW - 160, 24, 1);

      const link = document.createElement("a");
      const filenameTitle = $("#customTitle").value.trim() || "가족연표";

      link.download = `${filenameTitle}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    $("#saveBtn").addEventListener("click", saveAsImage);

    render();
  </script>
</body>
</html>
