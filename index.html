<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가족 연표 제작 사이트</title>
  <style>
    :root {
      --bg: #fff8ec;
      --panel: #ffffff;
      --line: #d8c6ad;
      --text: #2f2a25;
      --muted: #6f6458;
      --accent: #b98145;
      --accent-dark: #7a4f28;
      --soft: #f5eadb;
      --soft2: #fff2d9;
      --danger: #c65b4a;
      --shadow: 0 8px 24px rgba(88, 61, 34, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg), #ffffff 45%);
      color: var(--text);
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 18px 42px;
    }

    .top-card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 22px;
      padding: 22px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      letter-spacing: -0.03em;
      color: var(--accent-dark);
    }

    .name-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--soft2);
      border: 1.5px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
    }

    .name-box label {
      font-weight: 700;
      white-space: nowrap;
    }

    input, textarea, select, button {
      font: inherit;
    }

    input[type="text"], textarea, select {
      width: 100%;
      border: 1.5px solid #cdb99f;
      border-radius: 12px;
      background: #fffdf9;
      color: var(--text);
      padding: 10px 11px;
      outline: none;
      transition: 0.15s ease;
    }

    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(185, 129, 69, 0.18);
    }

    .student-name {
      width: min(220px, 60vw) !important;
      font-weight: 700;
    }

    .guide {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 210px;
      gap: 18px;
      align-items: start;
    }

    .timeline-card, .side-card, .reflection-card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .timeline-card {
      overflow: hidden;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 1050px;
      border-collapse: separate;
      border-spacing: 0;
    }

    thead th {
      background: var(--soft);
      color: var(--accent-dark);
      font-size: 15px;
      padding: 12px 8px;
      border-bottom: 2px solid var(--line);
      border-right: 1px solid var(--line);
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }

    thead th:last-child, tbody td:last-child { border-right: 0; }

    tbody td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      vertical-align: top;
      background: #fffdf9;
    }

    tbody tr:last-child td { border-bottom: 0; }

    .move-cell { width: 90px; text-align: center; }
    .year-cell { width: 125px; }
    .event-cell { width: 265px; }
    .before-cell, .after-cell { width: 210px; }
    .emotion-cell { width: 140px; }

    .move-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      justify-content: center;
      min-height: 76px;
    }

    .arrow-btn {
      width: 36px;
      height: 32px;
      border: 1.5px solid #c8aa85;
      border-radius: 10px;
      background: #fff6e8;
      color: var(--accent-dark);
      font-weight: 800;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .arrow-btn:hover { transform: translateY(-1px); background: #ffe7c4; }
    .arrow-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .side-card {
      padding: 16px;
      position: sticky;
      top: 14px;
    }

    .side-card h2 {
      font-size: 18px;
      margin: 0 0 12px;
      color: var(--accent-dark);
    }

    .side-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .action-btn {
      border: 0;
      border-radius: 15px;
      padding: 13px 12px;
      background: var(--accent);
      color: white;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(185, 129, 69, 0.22);
      transition: 0.16s ease;
      line-height: 1.35;
    }

    .action-btn:hover { transform: translateY(-1px); background: var(--accent-dark); }
    .action-btn.secondary { background: #7f9b73; box-shadow: 0 5px 12px rgba(92, 125, 83, 0.18); }
    .action-btn.secondary:hover { background: #5d7d53; }
    .action-btn.save { background: #6e83b7; box-shadow: 0 5px 12px rgba(68, 88, 148, 0.18); }
    .action-btn.save:hover { background: #4f659e; }

    .sort-status {
      margin-top: 12px;
      padding: 10px;
      background: #fff9f0;
      border: 1px dashed #cdb99f;
      border-radius: 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .reflection-card {
      margin-top: 18px;
      padding: 20px;
    }

    .reflection-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .reflect-box {
      background: #fffdf9;
      border: 1.5px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }

    .reflect-box h3, .inquiry h3 {
      margin: 0 0 10px;
      font-size: 17px;
      color: var(--accent-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
      line-height: 1.45;
    }

    .inquiry {
      background: var(--soft2);
      border: 1.5px solid #e2c69d;
      border-radius: 18px;
      padding: 14px;
    }

    .inquiry-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
    }

    .field-label {
      font-weight: 800;
      margin-bottom: 7px;
      display: block;
      color: var(--accent-dark);
    }

    .footer-note {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .capture-only {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 1400px;
      background: white;
      color: #2f2a25;
      padding: 36px;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
    }

    @media (max-width: 980px) {
      .workspace { grid-template-columns: 1fr; }
      .side-card { position: static; }
      .side-buttons { display: grid; grid-template-columns: repeat(3, 1fr); }
      .reflection-grid, .inquiry-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .page { padding: 16px 10px 30px; }
      .top-card, .timeline-card, .side-card, .reflection-card { border-radius: 16px; }
      .side-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page" id="app">
    <section class="top-card">
      <div class="title-row">
        <h1 id="mainTitle">가족 연표</h1>
        <div class="name-box">
          <label for="studentName">이름</label>
          <input id="studentName" class="student-name" type="text" placeholder="예: 민준" autocomplete="off" />
        </div>
      </div>
      <p class="guide">처음 화면에는 예시 5개가 들어 있습니다. 예시는 지우고 나의 가족 이야기로 바꿀 수 있습니다. 위·아래 화살표로 중요한 순서를 바꿀 수 있고, 버튼을 누르면 시간의 흐름 순서로도 볼 수 있습니다.</p>
    </section>

    <section class="workspace">
      <div class="timeline-card">
        <div class="table-wrap">
          <table aria-label="가족 연표 입력표">
            <thead>
              <tr>
                <th class="move-cell">순서<br />이동</th>
                <th class="year-cell">연도</th>
                <th class="event-cell">가족의 중요한 일</th>
                <th class="before-cell">일이 있기 전에는</th>
                <th class="after-cell">일이 있은 이후에는</th>
                <th class="emotion-cell">감정 이모티콘</th>
              </tr>
            </thead>
            <tbody id="timelineBody"></tbody>
          </table>
        </div>
      </div>

      <aside class="side-card">
        <h2>보기 방법</h2>
        <div class="side-buttons">
          <button class="action-btn" type="button" id="manualOrderBtn">중요한 일 순서대로 보기</button>
          <button class="action-btn secondary" type="button" id="timeOrderBtn">시간의 흐름 순서대로 보기</button>
          <button class="action-btn save" type="button" id="saveBtn">이미지로 저장하기</button>
        </div>
        <div class="sort-status" id="sortStatus">현재 보기: 중요한 일 순서</div>
      </aside>
    </section>

    <section class="reflection-card">
      <div class="reflection-grid">
        <div class="reflect-box">
          <h3>👥 친구 아이콘</h3>
          <label class="field-label" for="cheer">친구의 가족 연표를 보고 응원의 한마디!</label>
          <textarea id="cheer" placeholder="예: 가족의 소중한 기억을 잘 정리했어요!"></textarea>
        </div>
        <div class="reflect-box">
          <h3>❓ 질문 아이콘</h3>
          <label class="field-label" for="question">친구의 가족 연표를 보고 궁금한 점 질문하기</label>
          <textarea id="question" placeholder="예: 그 일이 가족에게 왜 특별했나요?"></textarea>
        </div>
        <div class="reflect-box">
          <h3>💬 나의 대답</h3>
          <label class="field-label" for="answerToFriend">친구의 질문에 대답하기</label>
          <textarea id="answerToFriend" placeholder="친구의 질문에 대한 나의 대답을 써 보세요."></textarea>
        </div>
      </div>

      <div class="inquiry">
        <h3>🔎 탐구 질문과 나의 답</h3>
        <div class="inquiry-row">
          <div>
            <label class="field-label" for="inquiryQuestion">탐구 질문</label>
            <input id="inquiryQuestion" type="text" value="시간의 흐름에 따라 나타내면 무엇을 알 수 있을까요?" />
          </div>
          <div>
            <label class="field-label" for="myAnswer">나의 답</label>
            <input id="myAnswer" type="text" placeholder="나의 생각을 써 보세요." />
          </div>
        </div>
      </div>
      <p class="footer-note">※ 이름과 입력 내용은 이 기기 안에서만 보입니다. 다른 곳으로 자동 전송되지 않습니다.</p>
    </section>
  </main>

  <script>
    const YEARS = Array.from({ length: 2026 - 2005 + 1 }, (_, i) => 2005 + i);
    const EMOTIONS = [
      "😊 기쁨", "🥰 사랑", "😮 놀람", "😢 슬픔", "😆 신남", "😌 평온", "😎 자랑스러움", "🤔 궁금함", "🙏 고마움", "💪 용기", "🎉 축하", "🌟 특별함"
    ];

    const EXAMPLE_ROWS = [
      { year: "2008", event: "부모님의 결혼", before: "가족이 아니었다.", after: "가족이 시작되었다.", emotion: "🎉 축하" },
      { year: "2013", event: "내가 태어남", before: "엄마 아빠 2명 가족이었다.", after: "가족이 3명이 되었다.", emotion: "🥰 사랑" },
      { year: "2020", event: "할아버지가 돌아가심", before: "할아버지가 용돈을 자주 주셨다.", after: "할아버지가 보고 싶다.", emotion: "😢 슬픔" },
      { year: "2022", event: "강아지를 입양했다.", before: "가족이 3명이라 심심했다.", after: "강아지가 나의 친구가 되었다.", emotion: "😊 기쁨" },
      { year: "2024", event: "이사왔다.", before: "집이 오래돼서 추웠다.", after: "광남초를 다니게 되었다.", emotion: "🌟 특별함" }
    ];

    let rows = EXAMPLE_ROWS.map((item, i) => ({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + i),
      importantIndex: i,
      ...item
    }));

    let currentMode = "important";

    const $ = (selector) => document.querySelector(selector);
    const body = $("#timelineBody");
    const studentName = $("#studentName");
    const mainTitle = $("#mainTitle");
    const sortStatus = $("#sortStatus");

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function updateTitle() {
      const name = studentName.value.trim();
      mainTitle.textContent = name ? `${name}네 가족 연표` : "가족 연표";
    }

    function saveCurrentInputs() {
      const trs = Array.from(body.querySelectorAll("tr"));
      trs.forEach((tr) => {
        const id = tr.dataset.id;
        const row = rows.find(item => item.id === id);
        if (!row) return;
        row.year = tr.querySelector(".year-select").value;
        row.event = tr.querySelector(".event-input").value;
        row.before = tr.querySelector(".before-input").value;
        row.after = tr.querySelector(".after-input").value;
        row.emotion = tr.querySelector(".emotion-select").value;
      });
    }

    function render() {
      body.innerHTML = "";
      rows.forEach((row, index) => {
        const tr = document.createElement("tr");
        tr.dataset.id = row.id;
        tr.innerHTML = `
          <td class="move-cell">
            <div class="move-buttons">
              <button type="button" class="arrow-btn up-btn" aria-label="위로 이동" ${index === 0 ? "disabled" : ""}>▲</button>
              <button type="button" class="arrow-btn down-btn" aria-label="아래로 이동" ${index === rows.length - 1 ? "disabled" : ""}>▼</button>
            </div>
          </td>
          <td class="year-cell">
            <select class="year-select" aria-label="연도 선택">
              <option value="">연도 선택</option>
              ${YEARS.map(y => `<option value="${y}" ${String(row.year) === String(y) ? "selected" : ""}>${y}년도</option>`).join("")}
            </select>
          </td>
          <td class="event-cell"><textarea class="event-input" placeholder="예: 부모님의 결혼">${escapeHtml(row.event)}</textarea></td>
          <td class="before-cell"><textarea class="before-input" placeholder="예: 가족이 아니었다">${escapeHtml(row.before)}</textarea></td>
          <td class="after-cell"><textarea class="after-input" placeholder="예: 가족이 시작되었다">${escapeHtml(row.after)}</textarea></td>
          <td class="emotion-cell">
            <select class="emotion-select" aria-label="감정 선택">
              <option value="">감정 선택</option>
              ${EMOTIONS.map(e => `<option value="${e}" ${row.emotion === e ? "selected" : ""}>${e}</option>`).join("")}
            </select>
          </td>
        `;
        body.appendChild(tr);
      });
    }

    function swapRows(fromIndex, toIndex) {
      if (toIndex < 0 || toIndex >= rows.length) return;
      saveCurrentInputs();
      const temp = rows[fromIndex];
      rows[fromIndex] = rows[toIndex];
      rows[toIndex] = temp;

      // 화살표로 정한 순서를 '중요한 일 순서'로 저장합니다.
      rows.forEach((row, index) => row.importantIndex = index);
      currentMode = "important";
      sortStatus.textContent = "현재 보기: 중요한 일 순서";
      render();
    }

    body.addEventListener("click", (event) => {
      const up = event.target.closest(".up-btn");
      const down = event.target.closest(".down-btn");
      if (!up && !down) return;
      const tr = event.target.closest("tr");
      const index = Array.from(body.children).indexOf(tr);
      if (up) swapRows(index, index - 1);
      if (down) swapRows(index, index + 1);
    });

    studentName.addEventListener("input", updateTitle);

    document.querySelector("#manualOrderBtn").addEventListener("click", () => {
      saveCurrentInputs();
      rows.sort((a, b) => a.importantIndex - b.importantIndex);
      currentMode = "important";
      sortStatus.textContent = "현재 보기: 중요한 일 순서";
      render();
    });

    document.querySelector("#exampleResetBtn").addEventListener("click", () => {
      rows = EXAMPLE_ROWS.map((item, i) => ({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + i),
        importantIndex: i,
        ...item
      }));
      currentMode = "important";
      sortStatus.textContent = "현재 보기: 중요한 일 순서";
      render();
    });

    document.querySelector("#timeOrderBtn").addEventListener("click", () => {
      saveCurrentInputs();
      rows.sort((a, b) => {
        const ay = a.year ? Number(a.year) : 9999;
        const by = b.year ? Number(b.year) : 9999;
        if (ay !== by) return ay - by;
        return a.importantIndex - b.importantIndex;
      });
      currentMode = "time";
      sortStatus.textContent = "현재 보기: 시간의 흐름 순서(오래된 일 → 최근 일)";
      render();
    });

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 3) {
      const words = String(text || "").split(/\s+/).filter(Boolean);
      if (words.length === 0) return y;
      let line = "";
      let lines = [];

      for (const word of words) {
        const testLine = line ? line + " " + word : word;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = testLine;
        }
      }
      if (line) lines.push(line);
      if (lines.length > maxLines) {
        lines = lines.slice(0, maxLines);
        while (ctx.measureText(lines[maxLines - 1] + "…").width > maxWidth && lines[maxLines - 1].length > 1) {
          lines[maxLines - 1] = lines[maxLines - 1].slice(0, -1);
        }
        lines[maxLines - 1] += "…";
      }
      lines.forEach((ln, i) => ctx.fillText(ln, x, y + i * lineHeight));
      return y + lines.length * lineHeight;
    }

    function drawRoundedRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
    }

    function saveAsImage() {
      saveCurrentInputs();
      updateTitle();

      const canvas = document.createElement("canvas");
      const scale = 2;
      const width = 1300;
      const height = 1650;
      canvas.width = width * scale;
      canvas.height = height * scale;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);

      ctx.fillStyle = "#fff8ec";
      ctx.fillRect(0, 0, width, height);

      drawRoundedRect(ctx, 32, 28, width - 64, 118, 24, "#ffffff", "#d8c6ad");
      ctx.fillStyle = "#7a4f28";
      ctx.font = "bold 42px Malgun Gothic, Arial";
      ctx.fillText(mainTitle.textContent || "가족 연표", 58, 82);
      ctx.fillStyle = "#6f6458";
      ctx.font = "22px Malgun Gothic, Arial";
      ctx.fillText(currentMode === "time" ? "보기: 시간의 흐름 순서" : "보기: 중요한 일 순서", 60, 122);

      const x0 = 32;
      const y0 = 178;
      const tableW = width - 64;
      const headerH = 58;
      const rowH = 150;
      const cols = [90, 125, 300, 255, 255, 210];
      const headers = ["순서", "연도", "가족의 중요한 일", "일이 있기 전에는", "일이 있은 이후에는", "감정"];

      drawRoundedRect(ctx, x0, y0, tableW, headerH + rowH * 5, 20, "#ffffff", "#d8c6ad");
      ctx.save();
      ctx.beginPath();
      ctx.rect(x0, y0, tableW, headerH + rowH * 5);
      ctx.clip();
      ctx.fillStyle = "#f5eadb";
      ctx.fillRect(x0, y0, tableW, headerH);

      let cx = x0;
      ctx.strokeStyle = "#d8c6ad";
      ctx.lineWidth = 2;
      ctx.font = "bold 20px Malgun Gothic, Arial";
      ctx.fillStyle = "#7a4f28";
      headers.forEach((h, i) => {
        ctx.fillText(h, cx + 14, y0 + 37);
        cx += cols[i];
        ctx.beginPath();
        ctx.moveTo(cx, y0);
        ctx.lineTo(cx, y0 + headerH + rowH * 5);
        ctx.stroke();
      });
      ctx.beginPath();
      ctx.moveTo(x0, y0 + headerH);
      ctx.lineTo(x0 + tableW, y0 + headerH);
      ctx.stroke();

      rows.forEach((row, r) => {
        const yy = y0 + headerH + rowH * r;
        ctx.beginPath();
        ctx.moveTo(x0, yy + rowH);
        ctx.lineTo(x0 + tableW, yy + rowH);
        ctx.stroke();

        ctx.fillStyle = r % 2 === 0 ? "#fffdf9" : "#fff9f0";
        ctx.fillRect(x0 + 1, yy + 1, tableW - 2, rowH - 2);

        let x = x0;
        ctx.fillStyle = "#7a4f28";
        ctx.font = "bold 28px Malgun Gothic, Arial";
        ctx.fillText(String(r + 1), x + 34, yy + 82);
        x += cols[0];

        ctx.font = "bold 22px Malgun Gothic, Arial";
        ctx.fillStyle = "#2f2a25";
        ctx.fillText(row.year ? `${row.year}년도` : "", x + 12, yy + 42);
        x += cols[1];

        ctx.font = "21px Malgun Gothic, Arial";
        ctx.fillStyle = "#2f2a25";
        wrapText(ctx, row.event, x + 12, yy + 36, cols[2] - 24, 30, 4);
        x += cols[2];

        wrapText(ctx, row.before, x + 12, yy + 36, cols[3] - 24, 30, 4);
        x += cols[3];

        wrapText(ctx, row.after, x + 12, yy + 36, cols[4] - 24, 30, 4);
        x += cols[4];

        ctx.font = "26px Malgun Gothic, Apple Color Emoji, Segoe UI Emoji, Arial";
        wrapText(ctx, row.emotion, x + 12, yy + 56, cols[5] - 24, 34, 2);
      });
      ctx.restore();

      const refY = y0 + headerH + rowH * 5 + 34;
      const boxGap = 18;
      const boxW = (tableW - boxGap * 2) / 3;
      const refTitles = [
        ["👥", "친구의 가족 연표를 보고 응원의 한마디!", document.querySelector("#cheer").value],
        ["❓", "친구의 가족 연표를 보고 궁금한 점 질문하기", document.querySelector("#question").value],
        ["💬", "친구의 질문에 대답하기", document.querySelector("#answerToFriend").value]
      ];
      refTitles.forEach((item, i) => {
        const bx = x0 + i * (boxW + boxGap);
        drawRoundedRect(ctx, bx, refY, boxW, 190, 18, "#ffffff", "#d8c6ad");
        ctx.fillStyle = "#7a4f28";
        ctx.font = "bold 21px Malgun Gothic, Apple Color Emoji, Arial";
        ctx.fillText(`${item[0]} ${item[1]}`, bx + 18, refY + 38);
        ctx.fillStyle = "#2f2a25";
        ctx.font = "20px Malgun Gothic, Arial";
        wrapText(ctx, item[2], bx + 18, refY + 80, boxW - 36, 30, 4);
      });

      const iqY = refY + 218;
      drawRoundedRect(ctx, x0, iqY, tableW, 180, 20, "#fff2d9", "#e2c69d");
      ctx.fillStyle = "#7a4f28";
      ctx.font = "bold 24px Malgun Gothic, Arial";
      ctx.fillText("🔎 탐구 질문", x0 + 22, iqY + 44);
      ctx.fillText("나의 답", x0 + 22, iqY + 112);
      ctx.fillStyle = "#2f2a25";
      ctx.font = "22px Malgun Gothic, Arial";
      wrapText(ctx, document.querySelector("#inquiryQuestion").value, x0 + 160, iqY + 44, tableW - 190, 32, 2);
      wrapText(ctx, document.querySelector("#myAnswer").value, x0 + 160, iqY + 112, tableW - 190, 32, 2);

      const link = document.createElement("a");
      const filenameName = studentName.value.trim() || "가족";
      link.download = `${filenameName}_가족연표.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    document.querySelector("#saveBtn").addEventListener("click", saveAsImage);

    render();
    updateTitle();
  </script>
</body>
</html>
